<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Generate OG Image PNG</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #e8e8ec; padding: 40px; text-align: center; }
    h1 { color: #ff6b35; }
    p { color: #a0a0b8; }
    canvas { border: 1px solid #333; margin: 20px 0; display: block; margin-left: auto; margin-right: auto; }
    button { background: #ff6b35; color: #fff; border: none; padding: 14px 32px; font-size: 18px; border-radius: 8px; cursor: pointer; margin: 10px; }
    button:hover { background: #e85a2a; }
    .status { margin-top: 16px; color: #4ecdc4; }
  </style>
</head>
<body>
  <h1>OG Image PNG Generator</h1>
  <p>Click the button to render the SVG OG image to a 1200x630 PNG.</p>
  <canvas id="canvas" width="1200" height="630"></canvas>
  <div>
    <button id="render-btn">Render SVG to Canvas</button>
    <button id="download-btn" disabled>Download PNG</button>
  </div>
  <div class="status" id="status"></div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const renderBtn = document.getElementById('render-btn');
    const downloadBtn = document.getElementById('download-btn');

    renderBtn.addEventListener('click', async () => {
      status.textContent = 'Loading SVG...';
      try {
        const resp = await fetch('og-image.svg');
        const svgText = await resp.text();
        const blob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, 1200, 630);
          ctx.drawImage(img, 0, 0, 1200, 630);
          URL.revokeObjectURL(url);
          status.textContent = 'Rendered! Click "Download PNG" to save.';
          downloadBtn.disabled = false;
        };
        img.onerror = () => {
          status.textContent = 'Error rendering SVG. Check console.';
          URL.revokeObjectURL(url);
        };
        img.width = 1200;
        img.height = 630;
        img.src = url;
      } catch (e) {
        status.textContent = 'Fetch error: ' + e.message;
      }
    });

    downloadBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'og-image.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      status.textContent = 'Downloaded! Place og-image.png in the project root.';
    });
  </script>
</body>
</html>
