<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ffc857"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#45b7d1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines (rhythm grid metaphor) -->
  <g opacity="0.06" stroke="#fff" stroke-width="1">
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- Rhythmic pulse circles (decorative) -->
  <circle cx="950" cy="315" r="120" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.12"/>
  <circle cx="950" cy="315" r="80" fill="none" stroke="#4ecdc4" stroke-width="2" opacity="0.15"/>
  <circle cx="950" cy="315" r="40" fill="none" stroke="#ffc857" stroke-width="2" opacity="0.2"/>
  <!-- Dots on outer circle -->
  <circle cx="950" cy="195" r="8" fill="#ff6b35" opacity="0.6"/>
  <circle cx="1070" cy="315" r="8" fill="#ff6b35" opacity="0.6"/>
  <circle cx="950" cy="435" r="8" fill="#ff6b35" opacity="0.6"/>
  <circle cx="830" cy="315" r="8" fill="#ff6b35" opacity="0.6"/>
  <!-- Dots on inner circle -->
  <circle cx="950" cy="235" r="6" fill="#4ecdc4" opacity="0.6"/>
  <circle cx="1019" cy="355" r="6" fill="#4ecdc4" opacity="0.6"/>
  <circle cx="881" cy="355" r="6" fill="#4ecdc4" opacity="0.6"/>

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo icon -->
  <rect x="60" y="160" width="56" height="56" rx="14" fill="url(#accent)"/>
  <text x="88" y="198" font-family="Arial, sans-serif" font-size="28" fill="#fff" text-anchor="middle">&#9835;</text>

  <!-- Title -->
  <text x="130" y="195" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#e8e8ec" letter-spacing="-1">
    Kaaro<tspan fill="#ff6b35">Percussion</tspan>
  </text>

  <!-- Tagline -->
  <text x="62" y="250" font-family="Inter, Arial, sans-serif" font-size="22" fill="#a0a0b8">
    Master the Silence Between the Beats
  </text>

  <!-- Divider line -->
  <rect x="62" y="275" width="80" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Phase pills -->
  <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600">
    <rect x="62" y="305" width="140" height="32" rx="16" fill="#1e1e38" stroke="#2a2a44" stroke-width="1"/>
    <text x="132" y="326" fill="#4ecdc4" text-anchor="middle">I. Temporal Grid</text>

    <rect x="214" y="305" width="140" height="32" rx="16" fill="#1e1e38" stroke="#2a2a44" stroke-width="1"/>
    <text x="284" y="326" fill="#4ecdc4" text-anchor="middle">II. Biomechanics</text>

    <rect x="366" y="305" width="140" height="32" rx="16" fill="#1e1e38" stroke="#2a2a44" stroke-width="1"/>
    <text x="436" y="326" fill="#4ecdc4" text-anchor="middle">III. Subdivisions</text>

    <rect x="518" y="305" width="155" height="32" rx="16" fill="#1e1e38" stroke="#2a2a44" stroke-width="1"/>
    <text x="596" y="326" fill="#4ecdc4" text-anchor="middle">IV. Independence</text>

    <rect x="62" y="348" width="130" height="32" rx="16" fill="#1e1e38" stroke="#2a2a44" stroke-width="1"/>
    <text x="127" y="369" fill="#ffc857" text-anchor="middle">V. Micro-Timing</text>

    <rect x="204" y="348" width="145" height="32" rx="16" fill="#1e1e38" stroke="#2a2a44" stroke-width="1"/>
    <text x="277" y="369" fill="#ffc857" text-anchor="middle">VI. Polyrhythms</text>

    <rect x="361" y="348" width="155" height="32" rx="16" fill="#1e1e38" stroke="#2a2a44" stroke-width="1"/>
    <text x="439" y="369" fill="#ffc857" text-anchor="middle">VII. Hand Perc.</text>

    <rect x="528" y="348" width="145" height="32" rx="16" fill="#1e1e38" stroke="#2a2a44" stroke-width="1"/>
    <text x="601" y="369" fill="#ffc857" text-anchor="middle">VIII. Pro Practice</text>
  </g>

  <!-- Feature highlights -->
  <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#a0a0b8">
    <text x="80" y="430">&#x25B6; Built-in Metronome with Ghost Beats</text>
    <text x="80" y="456">&#x266B; Virtual Tap Pads with Accuracy Tracking</text>
    <text x="80" y="482">&#x2191; XP System, Levels &amp; Streak Tracking</text>
    <text x="80" y="508">&#x25CF; Curated YouTube Video Lessons</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#050508"/>
  <text x="62" y="607" font-family="Inter, Arial, sans-serif" font-size="14" fill="#606078">
    Self-paced &#x2022; 8 Phases &#x2022; 48 Exercises &#x2022; Free &#x2022; No sign-up
  </text>
  <text x="1138" y="607" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff6b35" text-anchor="end">
    karx.github.io/kaaroPercussion
  </text>

  <!-- Accent bar at bottom -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#teal)"/>
</svg>
